<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Crop Rotation Scheduler (AG/PG)</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<h2>Block Design PG(2,p) & AG(2,p) Rotation Scheduler</h2>
<div class="desc">
  <strong>【Prototype】</strong>
  <ul>
    <li><b>Affine Plane AG(2,p)</b>: p² vegetables over p+1 years.</li>
    <li><b>Projective Plane PG(2,p)</b>: Covers all combinations.</li>
  </ul>
</div>
<div class="controls">
  <div><p>1. Select Plane Type</p><select id="planeType"><option value="affine">Affine Plane</option><option value="projective">Projective Plane</option></select></div>
  <div><p>2. Select p (Prime)</p><select id="pSelect"><option value="2">2</option><option value="3">3</option><option value="5">5</option></select></div>
</div>
<button onclick="generate()">Generate Input Fields</button>
<div id="setupArea" style="display:none;">
  <table id="vegTable"><thead><tr><th>#</th><th>Family</th><th>Vegetable</th></tr></thead><tbody></tbody></table>
  <div id="familyInfoBox"></div>
  <button onclick="makeSchedule()" style="background:#2196F3; margin-top:20px;">4. Generate Schedule</button>
  <ul id="rotation"></ul>
</div>
<script>
const familyCandidates = ["Solanaceae", "Brassicaceae", "Fabaceae", "Poaceae", "Amaranthaceae", "Apiaceae", "Asteraceae", "Cucurbitaceae", "Rosaceae", "Lamiaceae", "Amaryllidaceae", "Zingiberaceae", "Araceae", "Convolvulaceae", "Malvaceae", "Asparagaceae"];
const familyToVeg = { "Solanaceae": ["Tomato", "Eggplant", "Pepper", "Potato"], "Brassicaceae": ["Cabbage", "Napa Cabbage", "Broccoli", "Radish"], "Fabaceae": ["Edamame", "Green Beans", "Peas"], "Poaceae": ["Corn", "Wheat"], "Amaranthaceae": ["Spinach"], "Apiaceae": ["Carrot"], "Asteraceae": ["Lettuce"], "Cucurbitaceae": ["Cucumber"] };
const familyInfo = { "Solanaceae": { desc:"Wait 3-4 years.", soil:"Neutral", good:["Amaryllidaceae"] }, "Brassicaceae": { desc:"Wait 2-3 years.", soil:"pH 6.5+", good:["Amaryllidaceae"] }, "Fabaceae": { desc:"Nitrogen-fixing.", soil:"Dry", good:["Solanaceae"] } };
const familyStats = { "Fabaceae": { n_score: -10 }, "Solanaceae": { n_score: 15 }, "Brassicaceae": { n_score: 12 }, "Poaceae": { n_score: 5 }, "Cucurbitaceae": { n_score: 10 }, "Amaryllidaceae": { n_score: 2 }, "Asteraceae": { n_score: 3 }, "Apiaceae": { n_score: 4 }, "Amaranthaceae": { n_score: 6 }, "Lamiaceae": { n_score: 2 }, "Convolvulaceae": { n_score: 8 }, "Malvaceae": { n_score: 10 } };
</script>
<script src="script.js"></script>
</body>
</html>
