<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>輪作スケジュール生成（アフィン / 射影）</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>ブロックデザインPG(2,p)AG(2,p)・輪作スケジュール生成アプリ</h2>

<div class="desc">
  <strong>【プロトタイプ v2.0】</strong>
  <ul>
    <li><b>アフィン平面 AG(2,p)</b>: p²個の野菜をp+1年で回します。</li>
    <li><b>射影平面 PG(2,p)</b>: 全組合せを網羅し、連作障害を極限まで防ぎます。</li>
  </ul>
</div>

<div class="controls">
  <div>
    <p>1. 平面タイプを選択</p>
    <select id="planeType">
      <option value="affine">アフィン平面 AG(2,p)</option>
      <option value="projective">射影平面 PG(2,p)</option>
    </select>
  </div>
  <div>
    <p>2. p を選択（素数）</p>
    <select id="pSelect">
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="5">5</option>
    </select>
  </div>
</div>

<p><button onclick="generate()">野菜入力欄を生成</button></p>

<div id="setupArea" style="display:none;">
  <h3>3. 野菜と科の入力</h3>
  <table id="vegTable">
    <thead>
      <tr><th># (ID)</th><th>科を選択</th><th>野菜を選択</th></tr>
    </thead>
    <tbody></tbody>
  </table>

  <div id="familyInfoBox"></div>

  <p style="margin-top:20px;">
    <button onclick="makeSchedule()" style="background:#2196F3;">4. 輪作スケジュールを生成</button>
  </p>

  <h3>生成されたスケジュール</h3>
  <ul id="rotation"></ul>
</div>

<script>
// --- 日本語版用のデータ定義 ---
const familyCandidates = ["ナス科","アブラナ科","マメ科","イネ科","ヒユ科","セリ科","キク科","ウリ科","バラ科","シソ科","ヒガンバナ科","ショウガ科","サトイモ科","ヒルガオ科","アオイ科"];

<script src="script.js"></script>
</body>
</html>
