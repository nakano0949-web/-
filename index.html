        <div id="familyInfoBox"></div>
        <button onclick="makeSchedule()" style="background:#2196F3; color:white;">解析・スケジュール生成</button>
        <ul id="rotation"></ul>
    </div>
    <script>
        const familyCandidates = ["ナス科","アブラナ科","マメ科","イネ科","ウリ科"];
        const familyToVeg = {"ナス科":["トマト","ナス"],"アブラナ科":["キャベツ","大根"],"マメ科":["枝豆"],"イネ科":["トウモロコシ"],"ウリ科":["キュウリ"]};
        const familyInfo = {"ナス科":{desc:"3〜4年空ける",soil:"弱酸性"},"アブラナ科":{desc:"2〜3年空ける",soil:"pH6.5"}};
    </script>
    <script src="script.js"></script>
</body>
</html>
